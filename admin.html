<!DOCTYPE html>
<html lang="th">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>สรุปรายชื่อผู้สมัคร | สัปดาห์วิทยาศาสตร์ 2569</title>
<link href="https://fonts.googleapis.com/css2?family=Chakra+Petch:wght@600;700&family=IBM+Plex+Sans+Thai:wght@400;500;600&family=Sarabun:wght@400;600;700&display=swap" rel="stylesheet">
<style>
:root{--deep:#1b1240;--lav:#c9b6ff;--sky:#a8d8ff;--rose:#ffc0dd;--sun:#ffe59e;--mint:#b8f0dd;
  --line:rgba(201,182,255,.28)}
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'IBM Plex Sans Thai',sans-serif;background:var(--deep);color:#f4f0ff;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:radial-gradient(1000px 600px at 15% -6%,rgba(201,182,255,.26),transparent 60%),
             radial-gradient(900px 520px at 88% 2%,rgba(168,216,255,.2),transparent 58%)}
.wrap{position:relative;z-index:2;max-width:1080px;margin:0 auto;padding:26px 18px 80px}
.top{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:24px}
.top img{width:60px;height:60px;object-fit:contain;background:#fff;border-radius:50%;padding:5px}
.top h1{font-family:'Chakra Petch',sans-serif;font-size:24px;color:var(--sun);line-height:1.35}
.top p{font-size:13px;color:#b3a7d8;margin-top:3px}
.bar{display:flex;gap:11px;flex-wrap:wrap;margin-bottom:22px}
select,button{font-family:inherit;font-size:14.5px;padding:12px 16px;border-radius:12px;
  border:1.5px solid var(--line);background:rgba(20,13,48,.62);color:#fff;cursor:pointer}
select{min-width:230px}
select option{background:#241a52}
button.go{background:linear-gradient(97deg,var(--sun),var(--rose));color:#1b1240;border:none;font-weight:700;
  font-family:'Chakra Petch',sans-serif;letter-spacing:.02em}
button.go:hover{filter:brightness(1.07)}
a.back{color:var(--sky);text-decoration:none;font-size:14px;padding:12px 4px;display:inline-block}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:12px;margin-bottom:24px}
.stat{background:rgba(255,255,255,.07);border:1px solid var(--line);border-radius:16px;padding:16px}
.stat .n{font-family:'Chakra Petch',sans-serif;font-size:27px;color:var(--sun)}
.stat .l{font-size:12.5px;color:#ada1d4;margin-top:3px}
.grp{background:rgba(255,255,255,.06);border:1px solid var(--line);border-radius:18px;
  padding:20px;margin-bottom:17px}
.grp h2{font-family:'Chakra Petch',sans-serif;font-size:17px;color:var(--sun);margin-bottom:4px}
.grp .lvl{font-size:13px;color:var(--sky);margin-bottom:14px}
table{width:100%;border-collapse:collapse;font-size:14px}
th{background:rgba(201,182,255,.13);color:var(--lav);font-weight:600;padding:10px 11px;
  text-align:left;font-size:12.5px}
td{padding:10px 11px;border-bottom:1px solid rgba(201,182,255,.13);color:#e4ddf7}
tr.tm td{background:rgba(168,216,255,.09);font-weight:600;color:var(--sky);font-size:13px}
.empty{text-align:center;color:#8d81b8;padding:60px 20px;font-size:15px;line-height:2}

/* ============ LOCK ============ */
#app{display:none}
#lock{position:relative;z-index:2;min-height:100vh;display:grid;place-items:center;padding:24px}
.card{background:linear-gradient(168deg,rgba(255,255,255,.09),rgba(255,255,255,.04));
  border:1px solid var(--line);border-radius:22px;padding:34px 28px;max-width:410px;width:100%;
  text-align:center;backdrop-filter:blur(9px);box-shadow:0 16px 50px rgba(0,0,0,.35)}
.card img{width:78px;height:78px;object-fit:contain;background:#fff;border-radius:50%;padding:6px}
.card h1{font-family:'Chakra Petch',sans-serif;font-size:20px;color:var(--sun);margin:16px 0 6px}
.card p{font-size:13.5px;color:#b3a7d8;line-height:1.75;margin-bottom:20px}
.card input{width:100%;padding:14px 16px;border-radius:13px;font-size:16px;font-family:inherit;
  text-align:center;letter-spacing:.08em;background:rgba(20,13,48,.62);color:#fff;
  border:1.5px solid var(--line);margin-bottom:13px}
.card input:focus{outline:none;border-color:var(--sky);box-shadow:0 0 0 3.5px rgba(168,216,255,.2)}
.card button{width:100%;padding:15px;border:none;border-radius:13px;cursor:pointer;
  font-family:'Chakra Petch',sans-serif;font-weight:700;font-size:16px;color:#1b1240;
  background:linear-gradient(97deg,var(--sun),var(--rose) 50%,var(--lav))}
.card button:hover{filter:brightness(1.07)}
.card .bad{color:#ffa8a8;font-size:13.5px;margin-bottom:13px;display:none}
.card .bad.show{display:block}
.card a{display:inline-block;margin-top:18px;color:var(--sky);font-size:13.5px;text-decoration:none}

/* ============ PRINT ============ */
#print{display:none}
@media print{
  @page{size:A4 portrait;margin:13mm 12mm}
  body{background:#fff!important;color:#000!important;font-family:'Sarabun',sans-serif}
  body::before,.wrap,#lock{display:none!important}
  #print{display:block!important}
  .sheet{page-break-after:always}
  .sheet:last-child{page-break-after:auto}
  .phead{text-align:center;margin-bottom:12px}
  .phead img{width:66px;height:66px;object-fit:contain}
  .phead h1{font-size:16pt;font-weight:700;margin:6px 0 2px;line-height:1.45}
  .phead h2{font-size:13pt;font-weight:600;margin-top:7px}
  .phead .lv{font-size:11.5pt;margin-top:2px}
  .phead .dt{font-size:10pt;color:#444;margin-top:3px}
  table.p{width:100%;border-collapse:collapse;margin-top:11px;font-size:11pt}
  table.p th,table.p td{border:1px solid #000;padding:5px 6px}
  table.p th{background:#eee!important;-webkit-print-color-adjust:exact;print-color-adjust:exact;
    font-weight:700;text-align:center;font-size:10pt}
  table.p td.c{text-align:center}
  table.p tr.tm td{background:#f4f4f4!important;-webkit-print-color-adjust:exact;
    print-color-adjust:exact;font-weight:600;font-size:10.5pt}
  .bx{display:inline-block;width:13px;height:13px;border:1.3px solid #000}
  .sig{margin-top:26px;display:flex;justify-content:space-around;font-size:10.5pt;text-align:center}
  .sig div{width:44%}
  .sig .ln{border-bottom:1px dotted #000;height:26px;margin-bottom:5px}
}
</style>
</head>

const PASS = "KHPsci1234";
const KEY  = "khps_sci_admin";

function openApp(){
  document.getElementById('lock').style.display='none';
  document.getElementById('app').style.display='block';
  if(window.load) window.load();
  else window.__pendingLoad = true;
}
function tryUnlock(){
  const v=document.getElementById('pw').value;
  if(v===PASS){
    try{ sessionStorage.setItem(KEY,'1'); }catch(e){}
    openApp();
  }else{
    document.getElementById('bad').classList.add('show');
    document.getElementById('pw').value='';
    document.getElementById('pw').focus();
  }
}
document.getElementById('unlock').onclick=tryUnlock;
document.getElementById('pw').onkeydown=e=>{ if(e.key==='Enter') tryUnlock(); };
document.getElementById('lockout').onclick=()=>{
  try{ sessionStorage.removeItem(KEY); }catch(e){}
  location.reload();
};
try{ if(sessionStorage.getItem(KEY)==='1') openApp(); }catch(e){}

const ORDER=['quiz','robot','wow_lower','wow_upper','dance','recycle'];
let rows=[];

/* sort by class then no */
function classKey(c){
  const m=/ม\.(\d)\/(\d+)/.exec(c||'');
  return m ? (+m[1])*1000 + (+m[2])*10 : 99999;
}
const cmp=(a,b)=> classKey(a.class)-classKey(b.class) || (a.no||0)-(b.no||0)
                 || (a.name||'').localeCompare(b.name||'','th');

/* group: actName -> level -> {teams, solos} */
function build(list){
  const out=new Map();
  for(const r of list){
    const k=r.actName+'|||'+(r.level||'รวม');
    if(!out.has(k)) out.set(k,[]);
    out.get(k).push(r);
  }
  const keys=[...out.keys()].sort((x,y)=>{
    const ax=ORDER.indexOf(list.find(r=>r.actName===x.split('|||')[0])?.actId);
    const ay=ORDER.indexOf(list.find(r=>r.actName===y.split('|||')[0])?.actId);
    return (ax<0?99:ax)-(ay<0?99:ay) || x.localeCompare(y,'th');
  });
  return keys.map(k=>{
    const [act,lvl]=k.split('|||');
    const arr=out.get(k);
    const teams=new Map(), solo=[];
    for(const r of arr){
      if(r.team){ if(!teams.has(r.team)) teams.set(r.team,[]); teams.get(r.team).push(r); }
      else solo.push(r);
    }
    /* team order by lowest-class member */
    const tlist=[...teams.entries()].map(([n,m])=>({name:n,members:m.sort(cmp)}))
      .sort((a,b)=>cmp(a.members[0],b.members[0]));
    return {act,lvl,teams:tlist,solo:solo.sort(cmp),count:arr.length};
  });
}

function screenView(groups){
  const el=document.getElementById('screen');
  if(!groups.length){ el.innerHTML='<div class="empty">ยังไม่มีผู้สมัครในรายการนี้<br><small>เมื่อมีนักเรียนสมัคร รายชื่อจะขึ้นที่นี่</small></div>'; return; }
  el.innerHTML=groups.map(g=>{
    let body='';
    for(const t of g.teams){
      body+=`<tr class="tm"><td colspan="5">ทีม ${t.name} (${t.members.length} คน)</td></tr>`;
      t.members.forEach((m,i)=>{ body+=row(m,i+1); });
    }
    g.solo.forEach((m,i)=>{ body+=row(m,i+1); });
    return `<div class="grp"><h2>${g.act}</h2>
      <div class="lvl">${g.lvl} · ${g.count} คน${g.teams.length?` · ${g.teams.length} ทีม`:''}</div>
      <table><thead><tr><th style="width:44px">ที่</th><th>ชื่อ – สกุล</th>
        <th style="width:80px">ชั้น</th><th style="width:60px">เลขที่</th><th>หมายเหตุ</th>
      </tr></thead><tbody>${body}</tbody></table></div>`;
  }).join('');
}
const extraOf=r=>[r.category,r.costume?`“${r.costume}”`:''].filter(Boolean).join(' ');
const row=(m,i)=>`<tr><td>${i}</td><td>${m.name}</td><td>${m.class}</td>
  <td>${m.no??''}</td><td>${extraOf(m)||'—'}</td></tr>`;

function printView(groups){
  const now=new Date();
  const d=`พิมพ์เมื่อ ${now.toLocaleDateString('th-TH',{day:'numeric',month:'long',year:'numeric'})} ${now.toLocaleTimeString('th-TH',{hour:'2-digit',minute:'2-digit'})} น.`;
  document.getElementById('print').innerHTML = groups.map(g=>{
    let body='',n=0;
    for(const t of g.teams){
      body+=`<tr class="tm"><td colspan="7">ทีม ${t.name}</td></tr>`;
      t.members.forEach(m=>{ n++; body+=prow(m,n); });
    }
    g.solo.forEach(m=>{ n++; body+=prow(m,n); });
    if(!n) return '';
    return `<div class="sheet">
      <div class="phead">
        <img src="${LOGO}">
        <h1>รายชื่อผู้เข้าร่วมแข่งขันสัปดาห์วิทยาศาสตร์<br>โรงเรียนคลองหาดพิทยาคม ปีการศึกษา 2569</h1>
        <h2>${g.act}</h2>
        <div class="lv">ระดับ ${g.lvl} · จำนวน ${n} คน${g.teams.length?` (${g.teams.length} ทีม)`:''}</div>
        <div class="dt">${d}</div>
      </div>
      <table class="p"><thead><tr>
        <th style="width:32px">ที่</th><th>ชื่อ – สกุล</th>
        <th style="width:58px">ชั้น</th><th style="width:44px">เลขที่</th>
        <th style="width:105px">หมายเหตุ</th>
        <th style="width:72px">มาร่วม<br>กิจกรรม</th><th style="width:72px">ไม่มาร่วม<br>กิจกรรม</th>
      </tr></thead><tbody>${body}</tbody></table>
      <div class="sig">
        <div><div class="ln"></div>ลงชื่อกรรมการผู้ควบคุม</div>
        <div><div class="ln"></div>ลงชื่อผู้รับผิดชอบกิจกรรม</div>
      </div>
    </div>`;
  }).join('');
}
const prow=(m,i)=>`<tr><td class="c">${i}</td><td>${m.name}</td><td class="c">${m.class}</td>
  <td class="c">${m.no??''}</td><td>${extraOf(m)}</td>
  <td class="c"><span class="bx"></span></td><td class="c"><span class="bx"></span></td></tr>`;

function paint(){
  const v=document.getElementById('pick').value;
  const list = v==='__all' ? rows : rows.filter(r=>r.actName===v);
  const g=build(list);
  screenView(g); printView(g);
}

async function load(){
  document.getElementById('screen').innerHTML='<div class="empty">กำลังโหลดข้อมูล…</div>';
  try{
    const s=await getDocs(collection(db,'registrations'));
    rows=[]; s.forEach(d=>rows.push(d.data()));

    const names=[...new Set(rows.map(r=>r.actName))].sort((a,b)=>a.localeCompare(b,'th'));
    const sel=document.getElementById('pick'), cur=sel.value;
    sel.innerHTML='<option value="__all">ทุกกิจกรรม</option>'+
      names.map(n=>`<option value="${n}">${n}</option>`).join('');
    if([...sel.options].some(o=>o.value===cur)) sel.value=cur;

    const people=new Set(rows.map(r=>r.name+'|'+r.class));
    const teams =new Set(rows.filter(r=>r.team).map(r=>r.actName+'|'+r.team));
    document.getElementById('stats').innerHTML=`
      <div class="stat"><div class="n">${rows.length}</div><div class="l">รายการที่สมัคร</div></div>
      <div class="stat"><div class="n">${people.size}</div><div class="l">นักเรียน (ไม่ซ้ำ)</div></div>
      <div class="stat"><div class="n">${teams.size}</div><div class="l">ทีม</div></div>
      <div class="stat"><div class="n">${rows.filter(r=>r.actId==='robot').length} / 50</div><div class="l">ที่นั่งหุ่นยนต์</div></div>`;
    paint();
  }catch(e){
    document.getElementById('screen').innerHTML=
      `<div class="empty">โหลดข้อมูลไม่สำเร็จ<br><small>${e.message}</small></div>`;
  }
}
document.getElementById('pick').onchange=paint;
window.load=load;
/* load only after the gate is passed */
if(window.__pendingLoad || document.getElementById('app').style.display==='block') load();
</script>
